name: Report a bug
description: Create a report to help us improve the API and fix bugs
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report this bug! Please provide as much information as possible so we can fix it quickly.
  
  - type: input
    id: api_version
    attributes:
      label: API version
      description: Which version of `simplified-mojang-api` are you using? (e.g., 0.0.32)
      placeholder: "0.0.32"
    validations:
      required: true

  - type: input
    id: mc_version
    attributes:
      label: Minecraft version
      description: In which version of Bedrock does this happen? (e.g., 26.2)
      placeholder: "26.2"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what is going wrong
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs provided by the API in the console
      description: The API includes an error handler that provides detailed information about what happened, so if an error occurred, please provide us with the specific error message so we can pinpoint exactly what went wrong
      value: |
        ```text
        // Paste the log here
        ```
    validations:
      required: false